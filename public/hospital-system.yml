openapi: 3.0.3
info:
  title: Hospital Management System API
  version: 1.0.0
  description: REST API for the Flutter Mobile Client, handling RBAC, appointments,
    and patient records.
paths:
  /api-token-auth/:
    post:
      operationId: api_token_auth_create
      tags:
      - api-token-auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthToken'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthToken'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
  /api/emergency-contact/:
    get:
      operationId: api_emergency_contact_retrieve
      description: Retrieves the emergency service record for the authenticated patient.
      tags:
      - api
      security:
      - tokenAuth: []
      - basicAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyService'
          description: ''
    post:
      operationId: api_emergency_contact_create
      description: Submits a new emergency service request for the authenticated patient.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmergencyService'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmergencyService'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmergencyService'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyServiceSuccess'
          description: ''
  /api/feedback/:
    post:
      operationId: api_feedback_create
      description: Submits patient feedback to the hospital system.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feedback'
          application/x-www-form-urlencoded:
