components:
  schemas:
    AlertStatusEnum:
      enum:
      - deterioration
      - critical_lab
      - other
      type: string
      description: |-
        * `deterioration` - Patient Deterioration
        * `critical_lab` - Critical Lab Result
        * `other` - Other
    Appointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
          nullable: true
        time:
          type: string
          format: time
          nullable: true
        reason:
          type: string
          nullable: true
        consultation_type:
          $ref: '#/components/schemas/ConsultationTypeEnum'
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
        is_confirmed:
          type: boolean
        reschedule_request_date:
          type: string
          format: date
          nullable: true
        reschedule_request_time:
          type: string
          format: time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        patient:
          type: integer
        doctor:
          type: integer
        created_by:
          type: integer
          nullable: true
      required:
      - created_at
      - date
      - doctor
      - id
      - patient
      - time
      - updated_at
    AppointmentStatusEnum:
      enum:
      - Scheduled
      - Completed
      - Cancelled
      - Rescheduled
      type: string
      description: |-
        * `Scheduled` - Scheduled
        * `Completed` - Completed
        * `Cancelled` - Cancelled
        * `Rescheduled` - Rescheduled
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        action:
          type: string
          maxLength: 255
        model_name:
          type: string
          maxLength: 100
        model_instance_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        timestamp:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          nullable: true
      required:
      - action
      - id
      - model_instance_id
      - model_name
      - timestamp
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    Bill:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bill_number:
          type: string
          maxLength: 255
        date_created:
          type: string
          format: date
          readOnly: true
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        amount_paid:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/Status20cEnum'
        item_description:
          type: string
          maxLength: 255
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        profile:
          type: integer
      required:
      - bill_number
      - date_created
      - id
      - item_description
      - profile
      - status
      - total_amount
      - unit_price
    BlankEnum:
      enum:
      - ''
    CarePlan:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
        plan_description:
          type: string
      required:
      - created_at
      - id
      - patient
      - plan_description
    Certification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        staff:
          $ref: '#/components/schemas/Staff'
        name:
          type: string
          maxLength: 255
        description:
          type: string
        expiration_date:
          type: string
          format: date
        is_valid:
          type: boolean
      required:
      - description
      - expiration_date
      - id
      - name
      - staff
    ClaimStatusEnum:
      enum:
      - submitted
      - approved
      - denied
      type: string
      description: |-
        * `submitted` - Submitted
        * `approved` - Approved
        * `denied` - Denied
    ConsultationNote:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        appointment:
          type: integer
      required:
      - appointment
      - created_at
      - id
      - notes
      - updated_at
    ConsultationTypeEnum:
      enum:
      - Physical
      - Virtual
      type: string
      description: |-
        * `Physical` - Physical
        * `Virtual` - Virtual
    DoctorPatientMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        sender:
          type: integer
        recipient:
          type: integer
        message_content:
          type: string
        sent_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - message_content
      - recipient
      - sender
      - sent_at
    DoctorSchedule:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        doctor:
          type: integer
          nullable: true
        monday_start:
          type: string
          format: time
          nullable: true
        monday_end:
          type: string
          format: time
          nullable: true
        tuesday_start:
          type: string
          format: time
          nullable: true
        tuesday_end:
          type: string
          format: time
          nullable: true
        wednesday_start:
          type: string
          format: time
          nullable: true
        wednesday_end:
